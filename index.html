<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OI卡牌对决 - 天赋系统深度修复版</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #0a2f1f 0%, #0a2a1a 100%);
            font-family: 'Courier New', 'VT323', 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            max-width: 1450px;
            width: 100%;
            background: #1e2a2a;
            border: 8px solid #5b3e1a;
            border-radius: 24px;
            padding: 20px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #2c3e2b;
            padding: 10px 20px;
            border-bottom: 4px solid #7b5f2a;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        h1 { margin: 0; font-size: 28px; color: #f3d382; text-shadow: 3px 3px 0 #5a3a1a; }
        .difficulty-panel {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #1f2a1b;
            padding: 5px 12px;
            border-radius: 40px;
        }
        select, button {
            background: #2f2e1e;
            border: 2px solid #ba9b4a;
            color: #ffefb0;
            font-family: monospace;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        button { background: #5f4c2b; transition: 0.1s; }
        button:active { transform: scale(0.96); }
        .reset-btn { background: #7e2e2e; border-color: #e0a878; }
        .reroll-talent { background: #2a6b3b; border-color: #ffd966; margin-left: 10px; }
        .game-main { display: flex; gap: 20px; flex-wrap: wrap; }
        .game-play-area { flex: 3; min-width: 280px; }
        .game-rules {
            flex: 1; min-width: 220px;
            background: #0f1a12cc;
            border: 3px solid #6f8240;
            border-radius: 20px;
            padding: 12px;
            backdrop-filter: blur(3px);
            font-size: 12px;
            color: #d8f0c0;
        }
        .game-rules h3 { margin: 0 0 8px 0; color: #ffdd99; text-align: center; font-size: 18px; }
        .game-rules ul { padding-left: 18px; margin: 6px 0; }
        .rule-highlight { color: #ffcc66; font-weight: bold; }
        .leaderboard {
            background: #0f1a12e0;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #6f8240;
        }
        .players-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-start;
            transition: all 0.2s ease;
        }
        .player-card {
            background: #2b2b1f;
            border: 3px solid #8b6946;
            border-radius: 16px;
            padding: 8px 12px;
            flex: 1 1 180px;
            min-width: 180px;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 3px 3px 0 #0f0f05;
        }
        .player-card.rank-up { background: #3f4a2a; transform: scale(1.01); border-color: #ffcd7e; }
        .player-card.loser { opacity: 0.65; filter: grayscale(0.3); border-color: #5a3e2a; }
        .player-card.winner { border-color: #ffd966; background: #3a3a1e; box-shadow: 0 0 0 2px gold; }
        .player-name { font-size: 20px; font-weight: bold; background: #00000066; display: inline-block; padding: 0 8px; border-radius: 12px; color: #ffffb0; }
        .talent-badge { font-size: 11px; background: #4a3a2a; border-radius: 12px; padding: 2px 6px; margin-top: 4px; display: inline-block; width: 100%; text-align: center; color: #ffe0aa; }
        .ac-bar-container { background: #3a2a1c; border-radius: 20px; margin: 8px 0; height: 24px; overflow: hidden; border: 1px solid #cea56a; }
        .ac-fill { width: 0%; height: 100%; background: #5bc85b; background-image: linear-gradient(90deg, #7fe07f, #2f9f2f); transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .error-stats { display: flex; flex-wrap: wrap; gap: 5px; font-size: 11px; margin-top: 6px; justify-content: space-between; }
        .error-badge { background: #2a1c14; padding: 2px 6px; border-radius: 20px; font-weight: bold; }
        .error-badge.danger { background: #a1321f; color: #ffc0a0; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 100% { opacity: 1; text-shadow: 0 0 2px red; } }
        .ac-value { font-size: 18px; font-weight: bold; float: right; }
        .turn-indicator { background: #000000aa; border-left: 12px solid #ffcf60; padding: 6px 15px; font-size: 20px; margin-bottom: 16px; font-weight: bold; color: #ffe6aa; }
        .hand-area { background: #1a2c1c; border-radius: 36px; padding: 20px; margin: 20px 0; border: 2px dashed #aacf5a; }
        .hand-title { font-size: 18px; margin-bottom: 12px; color: #ead37c; }
        .cards-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card {
            background: #fdf0cf;
            border: 4px solid #b97f30;
            width: 160px;
            padding: 12px 8px;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            color: #2c2b1f;
            font-weight: bold;
            box-shadow: 5px 5px 0 #6a4a1e;
        }
        .card:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #6a4a1e; }
        .card-name { font-size: 18px; background: #e0bc7c; display: inline-block; padding: 2px 10px; border-radius: 20px; margin-bottom: 8px; }
        .card-desc { font-size: 11px; }
        .event-log { background: #071008; height: 120px; overflow-y: auto; padding: 8px; border-radius: 16px; font-size: 12px; color: #b6ffa0; border: 1px solid #55802e; margin-top: 20px; }
        .log-line { border-bottom: 1px solid #346623; padding: 3px; font-family: monospace; }
        .target-selector { margin-top: 10px; background: #2f3a24; padding: 8px; border-radius: 20px; text-align: center; }
        .target-buttons button { margin: 4px; background: #4d3e25; }
        footer { font-size: 10px; text-align: center; color: #7d976b; margin-top: 12px; }
        .extra-turn-tag { background: #ffaa33; color: #2a2a1a; border-radius: 20px; padding: 2px 10px; font-size: 12px; margin-left: 10px; }
        @media (max-width: 800px) { .card { width: 130px; } .player-card { min-width: 150px; } }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>⚔️ OI 卡牌对决 ⚔️</h1>
        <div class="difficulty-panel">
            <label>📜 难度:</label>
            <select id="difficultySelect">
                <option value="0">入门 (AC100)</option>
                <option value="1">普及- (120)</option>
                <option value="2" selected>普及/提高- (140)</option>
                <option value="3">普及+/提高 (160)</option>
                <option value="4">提高+/省选- (180)</option>
                <option value="5">省选/NOI- (200)</option>
            </select>
            <label>👥 人数:</label>
            <select id="playerCountSelect">
                <option value="2">2人</option>
                <option value="3" selected>3人</option>
                <option value="4">4人</option>
            </select>
            <button id="resetGameBtn" class="reset-btn">⚡ 新对局</button>
            <button id="rerollTalentBtn" class="reroll-talent">🎲 重随天赋</button>
        </div>
    </div>

    <div class="game-main">
        <div class="game-play-area">
            <div class="leaderboard"><div class="players-stats" id="playersStatsPanel"></div></div>
            <div class="turn-indicator" id="turnIndicator">⚙️ 准备就绪</div>
            <div class="hand-area" id="handArea">
                <div class="hand-title">📖 你的手牌 (点击卡牌选择，然后选目标)</div>
                <div class="cards-container" id="handCardsContainer"></div>
                <div id="targetSelectorPanel" style="display: none;" class="target-selector">
                    <div>🎯 选择目标玩家:</div>
                    <div id="targetButtons" class="target-buttons"></div>
                </div>
            </div>
            <div class="event-log" id="eventLog"><div class="log-line">✨ 天赋系统深度修复！现在每一个天赋都会真实生效，日志可见。</div></div>
        </div>
        <div class="game-rules">
            <h3>📜 游戏说明</h3>
            <ul>
                <li><span class="rule-highlight">⚔️ 目标</span>：AC率达到目标值即胜利。</li>
                <li><span class="rule-highlight">💀 失败</span>：WA/CE/TLE/MLE/RE任一达到100%被淘汰。</li>
                <li><span class="rule-highlight">✨ 天赋系统</span>：每位选手开局随机获得天赋，数值效果显著，日志可见。</li>
                <li><span class="rule-highlight">🔄 交换手牌</span>：使用后获得额外一次出牌机会。</li>
                <li><span class="rule-highlight">🎲 随机事件</span>：每回合30%概率触发。</li>
                <li><span class="rule-highlight">🧠 AI智能</span>：AI会合理使用功能牌及连出机会。</li>
            </ul>
        </div>
    </div>
    <footer>像素卡牌 | 天赋现在100%生效，每局体验独一无二！</footer>
</div>

<script>
    // ==================== 天赋系统 - 全新可靠接口 ====================
    const TALENT_POOL = [
        {
            id: "t1", name: "✨ 神犇附体", desc: "增益卡牌效果提升50%",
            modifyEffect(effects, target, isSelf, cardType) {
                if (!isSelf) return effects;
                let newEff = { ...effects };
                if (newEff.ac && newEff.ac > 0) {
                    let old = newEff.ac;
                    newEff.ac = Math.floor(newEff.ac * 1.5);
                    addLog(`✨ 神犇附体效果发动！AC增益从 ${old} 提升至 ${newEff.ac}`);
                }
                return newEff;
            }
        },
        {
            id: "t2", name: "💎 稳扎稳打", desc: "错误率增速减半，AC增速减少25%",
            modifyEffect(effects, target, isSelf) {
                if (!isSelf) return effects;
                let newEff = { ...effects };
                // 增益效果：AC 减少25%
                if (newEff.ac && newEff.ac > 0) {
                    let old = newEff.ac;
                    newEff.ac = Math.floor(newEff.ac * 0.75);
                    addLog(`💎 稳扎稳打：AC增益从 ${old} 降至 ${newEff.ac}`);
                }
                // 减益效果：错误率增加减半
                for (let k of ['wa','ce','tle','mle','re']) {
                    if (newEff[k] && newEff[k] > 0) {
                        let old = newEff[k];
                        newEff[k] = Math.floor(newEff[k] * 0.5);
                        addLog(`💎 稳扎稳打：${k.toUpperCase()}率增加从 ${old} 降至 ${newEff[k]}`);
                    }
                }
                return newEff;
            }
        },
        {
            id: "t3", name: "🧹 代码洁癖", desc: "自我净化效果+50%，攻击敌方威力-20%",
            modifyEffect(effects, target, isSelf) {
                let newEff = { ...effects };
                if (isSelf) {
                    // 自我增益：净化效果增强
                    let hasClean = false;
                    for (let k of ['wa','ce','tle','mle','re']) {
                        if (newEff[k] && newEff[k] < 0) {
                            let old = newEff[k];
                            newEff[k] = Math.floor(newEff[k] * 1.5);
                            addLog(`🧹 代码洁癖：${k.toUpperCase()}净化效果从 ${old} 增强至 ${newEff[k]}`);
                            hasClean = true;
                        }
                    }
                    if (newEff.ac && newEff.ac > 0) {
                        let old = newEff.ac;
                        newEff.ac = Math.floor(newEff.ac * 1.3);
                        addLog(`🧹 代码洁癖：AC增益从 ${old} 提升至 ${newEff.ac}`);
                    }
                } else {
                    // 攻击敌方：威力降低20%
                    for (let k of ['wa','ce','tle','mle','re']) {
                        if (newEff[k] && newEff[k] > 0) {
                            let old = newEff[k];
                            newEff[k] = Math.floor(newEff[k] * 0.8);
                            addLog(`🧹 代码洁癖：攻击威力从 ${old} 降至 ${newEff[k]}`);
                        }
                    }
                }
                return newEff;
            }
        },
        {
            id: "t4", name: "🔥 破釜沉舟", desc: "任意错误率>50时，每回合开始概率AC激增",
            onTurnStart(player) {
                let maxErr = Math.max(...Object.values(player.errors));
                if (maxErr > 50 && Math.random() < 0.35) {
                    let gain = Math.floor(getGoal() * 0.12);
                    player.ac = Math.min(getGoal(), player.ac + gain);
                    addLog(`🔥 ${player.name}触发【破釜沉舟】! AC+${gain}`);
                    clampStats(player);
                    return true;
                }
                return false;
            }
        },
        {
            id: "t5", name: "🧩 图论直觉", desc: "高级攻击牌有40%概率暴击双倍",
            modifyEffect(effects, target, isSelf, cardType) {
                if (!isSelf && cardType === 'super_atk' && Math.random() < 0.4) {
                    let newEff = {};
                    for (let k in effects) newEff[k] = effects[k] * 2;
                    addLog(`🧩 图论直觉触发！攻击效果翻倍！`);
                    return newEff;
                }
                return effects;
            }
        },
        {
            id: "t6", name: "📉 DP苦手", desc: "高级受益牌30%失效，普通增益牌+20%",
            modifyEffect(effects, target, isSelf, cardType) {
                let newEff = { ...effects };
                if (isSelf && cardType === 'super_buff') {
                    if (Math.random() < 0.3) {
                        addLog(`😭 DP苦手发作！高级受益牌失效！`);
                        return {};
                    }
                }
                if (isSelf && cardType !== 'super_buff' && cardType !== 'super_atk' && newEff.ac && newEff.ac > 0) {
                    let old = newEff.ac;
                    newEff.ac = Math.floor(newEff.ac * 1.2);
                    addLog(`📉 DP苦手：普通增益牌效果+20% (${old}→${newEff.ac})`);
                }
                return newEff;
            }
        }
    ];

    const CARD_POOL = [
        { id: "c1", name: "✨ 时空转换", effects: { tle: -15, mle: 5 }, desc: "TLE-15, MLE+5", type: "normal" },
        { id: "c2", name: "💻 代码重构", effects: { ac: 12, ce: -5 }, desc: "AC+12, CE-5", type: "normal" },
        { id: "c3", name: "🐛 逻辑漏洞", effects: { wa: 18 }, desc: "WA+18", type: "normal" },
        { id: "c4", name: "🧠 算法优化", effects: { ac: 20, tle: -8 }, desc: "AC+20, TLE-8", type: "normal" },
        { id: "c5", name: "🔥 内存泄漏", effects: { mle: 25 }, desc: "MLE+25", type: "normal" },
        { id: "c6", name: "⏱️ 死循环", effects: { tle: 30 }, desc: "TLE+30", type: "normal" },
        { id: "c7", name: "📚 板子背诵", effects: { ac: 15, ce: -3 }, desc: "AC+15, CE-3", type: "normal" },
        { id: "c8", name: "⚡ 评测机波动", effects: { re: 12, wa: 8 }, desc: "RE+12, WA+8", type: "normal" },
        { id: "c9", name: "🎯 精准剪枝", effects: { ac: 10, tle: -10, mle: -5 }, desc: "AC+10, TLE-10, MLE-5", type: "normal" },
        { id: "c10", name: "💀 段错误", effects: { re: 35 }, desc: "RE+35", type: "normal" },
        { id: "f1", name: "🔄 交换手牌", effects: {}, desc: "与目标交换全部手牌，并额外获得一次出牌机会", type: "swap_hand" },
        { id: "f2", name: "⚡ 连出两牌", effects: {}, desc: "本回合可额外再出一张牌", type: "double_turn" },
        { id: "f3", name: "🔥 高级攻击·全错误", effects: { wa:12, ce:12, tle:12, mle:12, re:12 }, desc: "全错误率+12", type: "super_atk" },
        { id: "f4", name: "💥 高级攻击·代码崩塌", effects: { wa: 30 }, desc: "WA+30 暴击", type: "super_atk" },
        { id: "f5", name: "🌟 高级受益·顿悟", effects: { ac: 25 }, desc: "AC+25", type: "super_buff" },
        { id: "f6", name: "🧹 高级受益·代码净化", effects: { wa: -15, ce: -15, tle: -15, mle: -15, re: -15 }, desc: "所有错误率-15", type: "super_buff" }
    ];

    const DIFFICULTY_GOAL = [100, 120, 140, 160, 180, 200];
    const ERROR_TYPES = ['wa', 'ce', 'tle', 'mle', 're'];
    const EVENT_POOL = [
        { name: "💥 代码错误", effect: (p) => { p.ac = Math.max(0, p.ac - 20); addLog(`💔 ${p.name} 代码错误！AC-20`); } },
        { name: "✨ 算法灵感", effect: (p) => { p.ac = Math.min(getGoal(), p.ac + 15); addLog(`🧠 ${p.name} 灵感迸发！AC+15`); } },
        { name: "🖥️ 评测姬重启", effect: (p) => { ERROR_TYPES.forEach(et => { p.errors[et] = Math.max(0, p.errors[et] - 8); }); addLog(`🔧 ${p.name} 错误率-8`); } },
        { name: "☠️ 编译器爆炸", effect: (p) => { p.errors.ce = Math.min(100, p.errors.ce + 20); addLog(`💢 ${p.name} CE率+20`); } },
        { name: "⌛ 时间压缩", effect: (p) => { p.errors.tle = Math.min(100, p.errors.tle + 15); addLog(`⏳ ${p.name} TLE率+15`); } }
    ];

    let gameState = {
        players: [], currentPlayerIdx: 0, gameActive: true, winGoal: 140,
        extraPlayRemaining: 0, pendingCard: null, waitingForTarget: false
    };

    function getGoal() { return gameState.winGoal; }
    function addLog(msg) {
        const logDiv = document.getElementById('eventLog');
        const line = document.createElement('div');
        line.className = 'log-line';
        line.innerText = `[${new Date().toLocaleTimeString().slice(0,5)}] ${msg}`;
        logDiv.appendChild(line);
        line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        if (logDiv.children.length > 45) logDiv.removeChild(logDiv.children[0]);
    }

    function clampStats(player) {
        if (player.isDead) return false;
        let goal = getGoal();
        player.ac = Math.min(goal, Math.max(0, player.ac));
        ERROR_TYPES.forEach(et => { player.errors[et] = Math.min(100, Math.max(0, player.errors[et])); });
        let deadByError = ERROR_TYPES.some(et => player.errors[et] >= 100);
        if (deadByError && !player.isDead && !player.isWinner) {
            player.isDead = true;
            addLog(`💀 ${player.name} 错误爆满！被淘汰出局！`);
            checkGameOver();
            return false;
        }
        if (player.ac >= goal && !player.isWinner) {
            player.isWinner = true;
            player.isDead = false;
            addLog(`🏆✨ ${player.name} AC本题！夺得胜利！✨🏆`);
            gameState.gameActive = false;
            return true;
        }
        return false;
    }

    function checkGameOver() {
        const alive = gameState.players.filter(p => !p.isDead && !p.isWinner);
        if (alive.length === 0 && !gameState.players.some(p => p.isWinner)) {
            addLog(`😱 全员WA/RE... 平局！`); gameState.gameActive = false; return true;
        }
        if (alive.length === 1 && !gameState.players.some(p => p.isWinner)) {
            let winner = alive[0]; winner.isWinner = true;
            addLog(`🏆 最终幸存者 ${winner.name} 获得胜利！`); gameState.gameActive = false; return true;
        }
        if (gameState.players.some(p => p.isWinner)) { gameState.gameActive = false; return true; }
        return false;
    }

    // 天赋修正核心
    function applyTalentModifiers(effects, target, isSelf, cardType) {
        let finalEff = { ...effects };
        if (target.talent && target.talent.modifyEffect) {
            finalEff = target.talent.modifyEffect(finalEff, target, isSelf, cardType) || finalEff;
        }
        return finalEff;
    }

    function applyNormalEffects(effects, target, isSelf, cardType) {
        let eff = applyTalentModifiers(effects, target, isSelf, cardType);
        if (eff.ac) target.ac += eff.ac;
        if (eff.wa) target.errors.wa += eff.wa;
        if (eff.ce) target.errors.ce += eff.ce;
        if (eff.tle) target.errors.tle += eff.tle;
        if (eff.mle) target.errors.mle += eff.mle;
        if (eff.re) target.errors.re += eff.re;
        return eff;
    }

    function useCard(player, card, targetId) {
        if (!gameState.gameActive) return false;
        let target = gameState.players.find(p => p.id === targetId);
        if (!target || target.isDead || target.isWinner) { addLog(`❌ 目标无效`); return false; }
        let idx = player.hand.findIndex(c => c.id === card.id);
        if (idx === -1) return false;
        player.hand.splice(idx, 1);

        let ended = false;
        if (card.type === "swap_hand") {
            let tempHand = [...player.hand];
            player.hand = [...target.hand];
            target.hand = tempHand;
            addLog(`🔄 ${player.name} 与 ${target.name} 交换了手牌！并获得额外一次出牌机会！`);
            gameState.extraPlayRemaining += 1;
        } 
        else if (card.type === "double_turn") {
            gameState.extraPlayRemaining += 1;
            addLog(`⚡ ${player.name} 使用了连出两牌！本回合可再出一张牌。`);
        }
        else {
            applyNormalEffects(card.effects, target, target === player, card.type);
            addLog(`🎴 ${card.name} → ${target.name}`);
            ended = clampStats(target);
        }
        refillHand(player);
        if (ended || checkGameOver()) { gameState.gameActive = false; return true; }
        return false;
    }

    function triggerRandomEvent() {
        if (!gameState.gameActive) return;
        let event = EVENT_POOL[Math.floor(Math.random() * EVENT_POOL.length)];
        let alive = gameState.players.filter(p => !p.isDead && !p.isWinner);
        if (alive.length === 0) return;
        let target = alive[Math.floor(Math.random() * alive.length)];
        addLog(`🎲 随机事件: ${event.name} → ${target.name}`);
        event.effect(target);
        clampStats(target);
        checkGameOver();
    }

    function refillHand(player) {
        let needed = 3 - player.hand.length;
        for (let i=0; i<needed; i++) {
            let randomCard = { ...CARD_POOL[Math.floor(Math.random() * CARD_POOL.length)] };
            player.hand.push(randomCard);
        }
        if (player.hand.length > 3) player.hand = player.hand.slice(0,3);
    }

    function applyTurnStartTalent(player) {
        if (player.talent && player.talent.onTurnStart) player.talent.onTurnStart(player);
    }

    // AI 决策（保持原有智能，但使用新的天赋系统）
    function aiTurn(aiPlayer) {
        if (!gameState.gameActive) return false;
        if (aiPlayer.hand.length === 0) refillHand(aiPlayer);
        let card = aiPlayer.hand[Math.floor(Math.random() * aiPlayer.hand.length)];
        let possibleTargets = gameState.players.filter(p => !p.isDead && !p.isWinner);
        if (possibleTargets.length === 0) return false;

        let target = null;
        if (card.type === "swap_hand") {
            let enemies = possibleTargets.filter(p => p.id !== aiPlayer.id);
            if (enemies.length) target = enemies.reduce((a,b) => (a.hand.length > b.hand.length ? a : b), enemies[0]);
            else target = aiPlayer;
        } 
        else if (card.type === "double_turn") target = aiPlayer;
        else if (card.type === "super_atk") {
            let enemies = possibleTargets.filter(p => p.id !== aiPlayer.id);
            if (enemies.length) target = enemies.reduce((a,b) => ((a.ac / gameState.winGoal) > (b.ac / gameState.winGoal) ? a : b), enemies[0]);
            else target = aiPlayer;
        }
        else {
            let positive = 0, negative = 0;
            let eff = card.effects;
            if (eff.ac) positive += eff.ac * 1.5;
            if (eff.tle && eff.tle < 0) positive += -eff.tle;
            if (eff.mle && eff.mle < 0) positive += -eff.mle;
            if (eff.ce && eff.ce < 0) positive += -eff.ce;
            if (eff.wa && eff.wa > 0) negative += eff.wa;
            if (eff.ce && eff.ce > 0) negative += eff.ce;
            if (eff.tle && eff.tle > 0) negative += eff.tle;
            if (eff.mle && eff.mle > 0) negative += eff.mle;
            if (eff.re && eff.re > 0) negative += eff.re;
            if (eff.ac && eff.ac < 0) negative += -eff.ac;
            if (positive > negative * 1.2) target = aiPlayer;
            else {
                let enemies = possibleTargets.filter(p => p.id !== aiPlayer.id);
                if (enemies.length) target = enemies.reduce((a,b) => ((a.ac / gameState.winGoal) > (b.ac / gameState.winGoal) ? a : b), enemies[0]);
                else target = aiPlayer;
            }
        }
        if (!target || target.isDead || target.isWinner) target = possibleTargets[0];
        addLog(`🤖 AI ${aiPlayer.name} 使用【${card.name}】→ ${target.name}`);
        let victory = useCard(aiPlayer, card, target.id);
        if (victory) { gameState.gameActive = false; renderAll(); return true; }
        return false;
    }

    function aiTurnWithExtra(aiPlayer) {
        if (!gameState.gameActive) return;
        let victory = aiTurn(aiPlayer);
        if (victory) { renderAll(); return; }
        if (!gameState.gameActive) return;
        if (gameState.extraPlayRemaining > 0) {
            gameState.extraPlayRemaining--;
            addLog(`🤖 AI 连出剩余 ${gameState.extraPlayRemaining+1} 次，继续行动`);
            setTimeout(() => { if (gameState.gameActive) aiTurnWithExtra(aiPlayer); }, 500);
        } else { setTimeout(() => nextTurn(), 500); }
    }

    function afterPlayerUse(player, card, targetId) {
        let victory = useCard(player, card, targetId);
        if (victory) { renderAll(); return; }
        if (!gameState.gameActive) { renderAll(); return; }
        if (gameState.extraPlayRemaining > 0) {
            gameState.extraPlayRemaining--;
            addLog(`✨ 连出剩余 ${gameState.extraPlayRemaining+1} 次，继续你的回合！`);
            renderAll();
        } else { nextTurn(); }
    }

    function nextTurn() {
        if (!gameState.gameActive) return;
        if (checkGameOver()) { renderAll(); return; }
        let start = gameState.currentPlayerIdx;
        let newIdx = (start + 1) % gameState.players.length;
        while (newIdx !== start && (gameState.players[newIdx].isDead || gameState.players[newIdx].isWinner)) {
            newIdx = (newIdx + 1) % gameState.players.length;
        }
        gameState.currentPlayerIdx = newIdx;
        let current = gameState.players[gameState.currentPlayerIdx];
        if ((!current.isDead && !current.isWinner) && gameState.gameActive) {
            applyTurnStartTalent(current);
            if (Math.random() < 0.35) triggerRandomEvent();
            renderAll();
            if (current.isDead || current.isWinner) { nextTurn(); return; }
            if (!current.isAI) {
                gameState.waitingForTarget = false;
                gameState.pendingCard = null;
                document.getElementById('targetSelectorPanel').style.display = 'none';
                addLog(`🎤 轮到你了，${current.name} 请出牌`);
                renderAll();
            } else {
                setTimeout(() => {
                    if (gameState.gameActive && !current.isDead && !current.isWinner && gameState.players[gameState.currentPlayerIdx] === current) {
                        aiTurnWithExtra(current);
                    } else if (gameState.gameActive) nextTurn();
                }, 400);
            }
        } else { if (gameState.gameActive) nextTurn(); }
        renderAll();
    }

    let rankCardCache = new Map();
    function updateLeaderboardSmooth() {
        const container = document.getElementById('playersStatsPanel');
        const sortedPlayers = [...gameState.players].sort((a,b) => {
            if (a.isWinner && !b.isWinner) return -1;
            if (!a.isWinner && b.isWinner) return 1;
            if (a.isDead && !b.isDead) return 1;
            if (!a.isDead && b.isDead) return -1;
            return (b.ac / gameState.winGoal) - (a.ac / gameState.winGoal);
        });
        for (let p of gameState.players) {
            if (!rankCardCache.has(p.id)) {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'player-card';
                cardDiv.setAttribute('data-id', p.id);
                rankCardCache.set(p.id, cardDiv);
            }
        }
        for (let p of gameState.players) {
            const card = rankCardCache.get(p.id);
            const acPercent = (p.ac / gameState.winGoal) * 100;
            let statusIcon = '';
            if (p.isWinner) statusIcon = '👑';
            else if (p.isDead) statusIcon = '💀';
            card.className = 'player-card';
            if (p.isWinner) card.classList.add('winner');
            if (p.isDead) card.classList.add('loser');
            card.innerHTML = `
                <div><span class="player-name">${p.name} ${statusIcon}</span><span class="ac-value">${p.ac}/${gameState.winGoal}</span></div>
                <div class="ac-bar-container"><div class="ac-fill" style="width: ${Math.min(100, acPercent)}%;"></div></div>
                <div class="error-stats">
                    <span class="error-badge ${p.errors.wa>=70?'danger':''}">WA:${p.errors.wa}</span>
                    <span class="error-badge ${p.errors.ce>=70?'danger':''}">CE:${p.errors.ce}</span>
                    <span class="error-badge ${p.errors.tle>=70?'danger':''}">TLE:${p.errors.tle}</span>
                    <span class="error-badge ${p.errors.mle>=70?'danger':''}">MLE:${p.errors.mle}</span>
                    <span class="error-badge ${p.errors.re>=70?'danger':''}">RE:${p.errors.re}</span>
                </div>
                <div class="talent-badge">✨ ${p.talent?.name || "无"}<br>${p.talent?.desc || ""}</div>
            `;
            const prevOrder = Array.from(container.children).findIndex(child => child.getAttribute('data-id') === p.id);
            const newOrderIdx = sortedPlayers.findIndex(sp => sp.id === p.id);
            if (prevOrder !== -1 && prevOrder !== newOrderIdx) {
                card.classList.add('rank-up');
                setTimeout(() => card.classList.remove('rank-up'), 300);
            }
        }
        for (let i = 0; i < sortedPlayers.length; i++) {
            const p = sortedPlayers[i];
            const card = rankCardCache.get(p.id);
            if (card && container.children[i] !== card) {
                if (container.children[i]) container.insertBefore(card, container.children[i]);
                else container.appendChild(card);
            }
        }
    }

    function renderHandAndTurn() {
        const turnDiv = document.getElementById('turnIndicator');
        const cur = gameState.players[gameState.currentPlayerIdx];
        let extraTag = gameState.extraPlayRemaining > 0 ? `<span class="extra-turn-tag">⚡连出剩余${gameState.extraPlayRemaining}次</span>` : '';
        turnDiv.innerHTML = gameState.gameActive ? `🔔 当前回合：${cur?.name} ${extraTag} ${cur?.isAI ? '(AI思考...)' : '【等待操作】'}` : `🏁 游戏结束! 点击新对局 🏁`;
        
        const handContainer = document.getElementById('handCardsContainer');
        const targetPanel = document.getElementById('targetSelectorPanel');
        const human = gameState.players.find(p => !p.isAI && !p.isDead && !p.isWinner);
        if (human && !gameState.players[gameState.currentPlayerIdx]?.isAI && gameState.gameActive && gameState.players[gameState.currentPlayerIdx] === human && !human.isDead && !human.isWinner) {
            handContainer.innerHTML = '';
            human.hand.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.innerHTML = `<div class="card-name">${card.name}</div><div class="card-desc">${card.desc}</div>`;
                cardEl.onclick = () => {
                    if (gameState.waitingForTarget) { addLog("请先完成上次选择"); return; }
                    gameState.pendingCard = card;
                    gameState.waitingForTarget = true;
                    const targetDiv = document.getElementById('targetButtons');
                    targetDiv.innerHTML = '';
                    gameState.players.filter(p => !p.isDead && !p.isWinner).forEach(tp => {
                        const btn = document.createElement('button');
                        btn.innerText = tp.name;
                        btn.onclick = () => {
                            afterPlayerUse(human, gameState.pendingCard, tp.id);
                            gameState.waitingForTarget = false;
                            gameState.pendingCard = null;
                            targetPanel.style.display = 'none';
                            renderAll();
                        };
                        targetDiv.appendChild(btn);
                    });
                    targetPanel.style.display = 'block';
                };
                handContainer.appendChild(cardEl);
            });
        } else {
            handContainer.innerHTML = '<div style="color:#aabb88; padding:12px;">⚡ 等待其他玩家出牌或游戏结束...</div>';
            targetPanel.style.display = 'none';
            gameState.waitingForTarget = false;
        }
        if (!gameState.gameActive) handContainer.innerHTML = '<div style="color:#e0aa70;">🏆 游戏结束，点击"新对局"继续挑战 🏆</div>';
    }

    function renderAll() { updateLeaderboardSmooth(); renderHandAndTurn(); }

    function assignRandomTalent(player) {
        let talentIdx = Math.floor(Math.random() * TALENT_POOL.length);
        player.talent = { ...TALENT_POOL[talentIdx] };
    }

    function rerollAllTalents() {
        for (let p of gameState.players) { assignRandomTalent(p); }
        addLog(`🎲 天赋已重置！每位选手获得了新的天赋。`);
        renderAll();
    }

    function initGame() {
        const difficultySelect = document.getElementById('difficultySelect');
        const playerCountSelect = document.getElementById('playerCountSelect');
        let diffIdx = parseInt(difficultySelect.value);
        let pCount = parseInt(playerCountSelect.value);
        gameState.winGoal = DIFFICULTY_GOAL[diffIdx];
        gameState.gameActive = true;
        gameState.waitingForTarget = false;
        gameState.pendingCard = null;
        gameState.extraPlayRemaining = 0;

        let playersList = [];
        playersList.push({ id: "p0", name: "👨‍💻 我", isAI: false, isDead: false, isWinner: false, ac: 0, errors: { wa:0, ce:0, tle:0, mle:0, re:0 }, hand: [] });
        let aiNames = ["🧑‍💻 神犇WY", "👩‍💻 喵喵Coder", "🤖 蒟蒻杀手", "🐉 AK_IOI", "⚙️ 评测姬"];
        for (let i=1; i<pCount; i++) {
            playersList.push({ id: `p${i}`, name: aiNames[(i-1)%aiNames.length], isAI: true, isDead: false, isWinner: false, ac: 0, errors: { wa:0, ce:0, tle:0, mle:0, re:0 }, hand: [] });
        }
        for (let i = playersList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [playersList[i], playersList[j]] = [playersList[j], playersList[i]];
        }
        gameState.players = playersList;
        for (let p of gameState.players) {
            p.hand = [];
            refillHand(p);
            p.ac = 0;
            p.errors = { wa:0, ce:0, tle:0, mle:0, re:0 };
            p.isDead = false;
            p.isWinner = false;
            assignRandomTalent(p);
        }
        let currentIdx = gameState.players.findIndex(p => !p.isAI);
        if (currentIdx === -1) currentIdx = 0;
        gameState.currentPlayerIdx = currentIdx;
        gameState.gameActive = true;
        rankCardCache.clear();
        document.getElementById('playersStatsPanel').innerHTML = '';
        addLog(`🎮 新对局！难度: ${difficultySelect.options[diffIdx].text}，目标AC ${gameState.winGoal}`);
        addLog(`🎲 天赋已随机分配！每位选手拥有独特能力，日志可见效果。`);
        renderAll();
        if (gameState.players[gameState.currentPlayerIdx].isAI) {
            setTimeout(() => { if (gameState.gameActive) aiTurnWithExtra(gameState.players[gameState.currentPlayerIdx]); }, 300);
        }
    }

    document.getElementById('resetGameBtn').addEventListener('click', () => initGame());
    document.getElementById('rerollTalentBtn').addEventListener('click', () => { if(gameState.gameActive) rerollAllTalents(); else initGame(); });
    document.getElementById('difficultySelect').addEventListener('change', () => initGame());
    document.getElementById('playerCountSelect').addEventListener('change', () => initGame());
    initGame();
</script>
</body>
